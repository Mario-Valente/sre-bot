# =============================================================================
# Helm Values: kube-prometheus-stack
# =============================================================================
# Chart: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
#
# Install:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm install prometheus prometheus-community/kube-prometheus-stack -n monitoring -f k8s/helm-values/kube-prometheus-stack.yaml
# =============================================================================

# Global settings
fullnameOverride: prometheus

# Prometheus configuration
prometheus:
  prometheusSpec:
    # Resource limits for local dev
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1Gi
        cpu: 500m

    # Retention
    retention: 7d
    retentionSize: "5GB"

    # Storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Enable remote write receiver (for external metrics)
    enableRemoteWriteReceiver: true

    # ServiceMonitor selector - monitor all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

  # Service configuration for NodePort access
  service:
    type: NodePort
    nodePort: 30909

# Alertmanager configuration
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 200m

  # Configure webhook to SRE Copilot
  config:
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'service', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'sre-copilot'
      routes:
        - receiver: 'sre-copilot'
          matchers:
            - severity =~ "critical|warning"

    receivers:
      - name: 'sre-copilot'
        webhook_configs:
          - url: 'http://sre-copilot.default.svc.cluster.local:8000/webhook/alertmanager'
            send_resolved: true

# Grafana configuration
grafana:
  enabled: true

  adminPassword: admin

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 250m

  service:
    type: NodePort
    nodePort: 30300

  # Additional datasources (Loki, Tempo)
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.monitoring.svc.cluster.local:80
      access: proxy
      isDefault: false

    - name: Tempo
      type: tempo
      url: http://tempo.monitoring.svc.cluster.local:3200
      access: proxy
      isDefault: false
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          filterByTraceID: true
          filterBySpanID: false
        tracesToMetrics:
          datasourceUid: prometheus
        serviceMap:
          datasourceUid: prometheus
        nodeGraph:
          enabled: true
        lokiSearch:
          datasourceUid: loki

  # Sidecar for dashboards
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL

# Disable components not needed for local dev
kubeEtcd:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

# Node exporter for host metrics
nodeExporter:
  enabled: true

# Kube state metrics
kubeStateMetrics:
  enabled: true
