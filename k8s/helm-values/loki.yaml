# =============================================================================
# Helm Values: Grafana Loki
# =============================================================================
# Chart: https://github.com/grafana/loki/tree/main/production/helm/loki
#
# Install:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm install loki grafana/loki -n monitoring -f k8s/helm-values/loki.yaml
# =============================================================================

# Deployment mode: single binary for local dev
deploymentMode: SingleBinary

# Single binary configuration
singleBinary:
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 250m

  persistence:
    enabled: true
    size: 10Gi

# Loki configuration
loki:
  # Authentication disabled for local dev
  auth_enabled: false

  # Common configuration
  commonConfig:
    replication_factor: 1

  # Schema configuration
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  # Storage configuration
  storage:
    type: filesystem

  # Limits
  limits_config:
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    max_query_parallelism: 2
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20

  # Querier
  querier:
    max_concurrent: 4

# Gateway configuration
gateway:
  enabled: true
  replicas: 1
  service:
    type: NodePort
    nodePort: 30310

# Disable components not needed for single binary
backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

# Disable minio (use filesystem)
minio:
  enabled: false

# Monitoring
monitoring:
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false

# Test disabled
test:
  enabled: false
