{{- if .Values.rbac.create -}}
{{- if .Values.rbac.clusterWide }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sre-copilot.fullname" . }}
  labels:
    {{- include "sre-copilot.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "sre-copilot.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "sre-copilot.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sre-copilot.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sre-copilot.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "sre-copilot.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "sre-copilot.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
